name: Deploy Backend → Somee

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Generar appsettings.Production.json
        run: |
          jq -n \
            --arg db  "${{ secrets.DB_CONNECTION_STRING }}" \
            --arg jwt "${{ secrets.JWT_KEY }}" \
            '{
              ConnectionStrings: { DefaultConnection: $db },
              Jwt: {
                Key: $jwt,
                Issuer: "GestorAdmi",
                Audience: "GestorAdmiClient",
                ExpirationHours: 8
              },
              Cors: {
                AllowedOrigins: [
                  "https://CNEAPI.somee.com",
                  "http://CNEAPI.somee.com",
                  "https://admin-cne-luis-cadmes-projects.vercel.app"
                ]
              },
              AllowedHosts: "*"
            }' > src/API/appsettings.Production.json

      - name: Publish
        run: |
          dotnet publish src/API/API.csproj \
            -c Release \
            -o ./publish \
            --no-self-contained

      - name: Deploy via FTP a Somee
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:   ${{ secrets.SOMEE_FTP_SERVER }}
          username: ${{ secrets.SOMEE_FTP_USERNAME }}
          password: ${{ secrets.SOMEE_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/appsettings.Development.json
